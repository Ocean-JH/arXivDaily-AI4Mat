<article class="paper">
  <div class="paper-index" aria-hidden="true">{index}</div>
  <div class="paper-body">
  <h3 class="paper-title">{title}{tag}</h3>

  <div class="paper-info">
    <p class="paper-authors"><strong>Authors:</strong> {authors}</p>
    <p class="paper-date"><strong>Published:</strong> {published_date}</p>
    <p class="paper-category"><strong>Category:</strong> {category}</p>
    <p class="paper-id"><strong>ID:</strong> {paper_id}</p>
  </div>

  <p class="paper-link"><strong>arXiv:</strong> <a href="{url}" target="_blank" rel="noopener noreferrer">{url}</a></p>

  <details class="paper-summary">
    <summary>Abstract</summary>
    <p>{summary}</p>
  </details>
  </div>
</article>
